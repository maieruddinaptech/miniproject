
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | CHRONOLUX</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#0D0D0D;
            color:#fff;
            overflow:hidden;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* Animated Background */

        body::before{
            content:'';
            position:absolute;
            width:700px;
            height:700px;
            background:#D4AF37;
            filter:blur(180px);
            opacity:.15;
            border-radius:50%;
            animation:move 8s ease-in-out infinite alternate;
        }

        @keyframes move{
            from{
                transform:translate(-150px,-100px);
            }
            to{
                transform:translate(180px,120px);
            }
        }

        .glass-card{
            position:relative;
            z-index:5;
            width:90%;
            max-width:760px;
            padding:60px 40px;
            text-align:center;
            border:1px solid rgba(212,175,55,.25);
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(18px);
            border-radius:25px;
            box-shadow:0 0 40px rgba(212,175,55,.15);
        }

        h1{
            font-family:'Playfair Display',serif;
            font-size:8rem;
            color:#D4AF37;
            text-shadow:0 0 25px rgba(212,175,55,.45);
        }

        h2{
            font-family:'Playfair Display',serif;
            font-size:2.3rem;
            margin-bottom:15px;
        }

        p{
            color:#d9d9d9;
            max-width:520px;
            margin:auto;
            line-height:1.8;
        }

        .btn-gold{
            margin-top:35px;
            background:#D4AF37;
            color:#000;
            padding:14px 35px;
            border:none;
            border-radius:50px;
            font-weight:600;
            transition:.35s;
        }

        .btn-gold:hover{
            transform:translateY(-5px);
            background:#f0cb55;
            box-shadow:0 0 25px rgba(212,175,55,.45);
        }

        .watch-icon{
            font-size:70px;
            color:#D4AF37;
            margin-bottom:20px;
            animation:rotate 8s linear infinite;
        }

        @keyframes rotate{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);
            }
        }

        .brand{
            color:#D4AF37;
            letter-spacing:5px;
            font-weight:600;
            margin-bottom:20px;
        }

        .floating{
            position:absolute;
            border-radius:50%;
            background:#D4AF37;
            opacity:.15;
            animation:float 6s infinite ease-in-out;
        }

        .f1{
            width:20px;
            height:20px;
            left:10%;
            top:20%;
        }

        .f2{
            width:15px;
            height:15px;
            right:12%;
            top:30%;
            animation-delay:2s;
        }

        .f3{
            width:25px;
            height:25px;
            bottom:15%;
            left:25%;
            animation-delay:1s;
        }

        .f4{
            width:18px;
            height:18px;
            bottom:20%;
            right:18%;
            animation-delay:3s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-20px);
            }
        }

        @media(max-width:768px){

            h1{
                font-size:5rem;
            }

            h2{
                font-size:1.8rem;
            }

            .glass-card{
                padding:40px 25px;
            }
        }
    </style>
</head>
<body>

<div class="floating f1"></div>
<div class="floating f2"></div>
<div class="floating f3"></div>
<div class="floating f4"></div>

<div class="glass-card">

    <div class="watch-icon">
        <i class="bi bi-watch"></i>
    </div>

    <div class="brand">
        CHRONOLUX
    </div>

    <h1>404</h1>

    <h2>Luxury Lost in Time</h2>

    <p>
        The page you're searching for has disappeared from our exclusive collection.
        Let's return you to the timeless elegance of CHRONOLUX.
    </p>

    <a href="index.html" class="btn btn-gold">
        <i class="bi bi-house-door-fill"></i>
        Back to Home
    </a>

</div>

</body>
</html>
